name: Supply Chain Audit

on:
  schedule:
    # Daily at 06:00 UTC. Picked to land before the typical workday so a
    # blocking finding is visible the morning it appears.
    - cron: "0 6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "requirements*.in"
      - "requirements*.txt"
      - "package.json"
      - "package-lock.json"
      - "tools/**"
      - ".github/workflows/supply-chain-audit.yml"

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit + npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run supply-chain audit
        run: |
          mkdir -p output/supply-chain-audit
          python -m tools security supply-chain \
            --format summary \
            --output output/supply-chain-audit/summary.txt
          python -m tools security supply-chain \
            --format json \
            --no-fail \
            --output output/supply-chain-audit/findings.json

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: supply-chain-audit
          path: output/supply-chain-audit
          if-no-files-found: error

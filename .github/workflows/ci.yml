name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-frontend-artifacts:
    name: Build Frontend Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build frontend artifacts
        run: |
          npm run build:frontend
          npm run build:frontend:standalone

      - name: Package frontend build outputs
        run: |
          tar -czf frontend-dist.tgz static/dist
          tar -czf standalone-output.tgz output/standalone

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-tarball
          path: frontend-dist.tgz

      - name: Upload standalone output artifact
        uses: actions/upload-artifact@v6
        with:
          name: standalone-output-tarball
          path: standalone-output.tgz

  frontend-backend:
    name: Frontend, Backend, And Tooling
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run local git hooks in CI
        run: python -m pre_commit run --hook-stage pre-push --all-files --show-diff-on-failure

      - name: Enforce typed frontend source
        run: |
          if [ -d frontend-ts ]; then
            echo "frontend-ts should not exist after the Vite migration"
            exit 1
          fi
          if rg --line-number "@ts-nocheck" frontend; then
            echo "frontend must not contain @ts-nocheck suppressions"
            exit 1
          fi
          if rg --line-number "as unknown as" frontend; then
            echo "frontend must not contain 'as unknown as' bridges"
            exit 1
          fi

      - name: Enforce exact contract boundaries
        run: |
          if rg --line-number "Record<string, unknown>|\[key: string\]: unknown" frontend --glob "!frontend/runtime-validation.ts"; then
            echo "frontend contract surfaces must not use open-ended unknown object bags outside runtime-validation.ts"
            exit 1
          fi
          if rg --line-number "normalize[A-Z][A-Za-z]+\([^)]*: unknown|value: unknown|tool: unknown|theme: unknown" frontend --glob "!frontend/parsers/**" --glob "!frontend/runtime-validation.ts"; then
            echo "frontend raw-value normalization must stay inside dedicated parser modules"
            exit 1
          fi
          if rg --line-number "Promise<unknown>|setPreviewCells\(cells: unknown\)|previewPaintCells: \(cells: unknown\)|cache: GeometryCache \| null \| unknown" frontend; then
            echo "frontend public contracts must not expose broad async or render helper types"
            exit 1
          fi
          if rg --line-number "type\\?: unknown|cells\\?: unknown|cache as|isPolygonGeometryCache\(cache: unknown\)|isHexGeometryCache\(cache: unknown\)|isTriangleGeometryCache\(cache: unknown\)" frontend; then
            echo "frontend geometry adapters must use shared exact cache guards"
            exit 1
          fi
          if rg --line-number "\bJsonObject\b|\bJsonArray\b|\bJsonDocument\b" backend tests tools; then
            echo "raw JSON aliases must use the explicit RawJson* names"
            exit 1
          fi
          if rg --line-number "RawJsonObject|RawJsonDocument" backend tests tools --glob "!backend/payload_types.py" --glob "!backend/frontend_assets.py" --glob "!backend/defaults.py" --glob "!backend/contract_validation.py" --glob "!backend/web/requests.py" --glob "!backend/web/routes.py" --glob "!backend/web/state_actions.py" --glob "!backend/simulation/persistence.py" --glob "!backend/simulation/periodic_face_tilings.py" --glob "!tests/typed_payloads.py" --glob "!tests/e2e/support_server.py"; then
            echo "raw JSON aliases must stay inside dedicated ingress and validation modules"
            exit 1
          fi
          if rg --line-number "NotRequired\[object\]" tests; then
            echo "test override builders must use exact field types"
            exit 1
          fi
          if rg --line-number "dict\[str, object\]" backend/simulation/topology_catalog.py backend/defaults.py backend/frontend_assets.py; then
            echo "backend bootstrapped export layer must not use dict[str, object]"
            exit 1
          fi

      - name: Type check frontend
        run: npm run typecheck:frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Run frontend unit tests
        run: npm run test:frontend

      - name: Run type checking
        run: python -m mypy --config-file mypy.ini

      - name: Validate tiling descriptors
        run: python tools/validate_tilings.py

      - name: Verify literature-backed tiling references
        run: python tools/verify_reference_tilings.py

      - name: Run Playwright suite integrity guard
        run: python -m unittest -q tests.e2e.test_playwright_suite_integrity

  backend-unit-coverage:
    name: Backend Unit Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          python -m coverage erase
          python -m coverage run --data-file=.coverage.unit -m unittest discover -s tests/unit -p "test_*.py"
          python -m coverage report --data-file=.coverage.unit -m | tee coverage-unit.txt

      - name: Upload backend unit coverage data
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-unit
          include-hidden-files: true
          path: |
            .coverage.unit
            coverage-unit.txt

  backend-api-coverage:
    name: Backend API Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-frontend-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist-tarball

      - name: Extract frontend dist artifact
        run: tar -xzf frontend-dist.tgz -C .

      - name: Run API tests with coverage
        run: |
          python -m coverage erase
          python -m coverage run --data-file=.coverage.api -m unittest discover -s tests/api -p "test_*.py"
          python -m coverage report --data-file=.coverage.api -m | tee coverage-api.txt

      - name: Upload backend API coverage data
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-api
          include-hidden-files: true
          path: |
            .coverage.api
            coverage-api.txt

  backend-coverage-report:
    name: Backend Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend-unit-coverage
      - backend-api-coverage

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage==7.11.0

      - name: Download backend unit coverage data
        uses: actions/download-artifact@v5
        with:
          name: backend-coverage-unit
          path: coverage-artifacts/unit

      - name: Download backend API coverage data
        uses: actions/download-artifact@v5
        with:
          name: backend-coverage-api
          path: coverage-artifacts/api

      - name: Combine backend coverage reports
        run: |
          cp coverage-artifacts/unit/.coverage.unit .coverage.unit
          cp coverage-artifacts/api/.coverage.api .coverage.api
          python -m coverage combine .coverage.unit .coverage.api
          python -m coverage report -m | tee coverage-unit-api.txt
          python -m coverage xml -o coverage-unit-api.xml

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: |
            coverage-unit-api.txt
            coverage-unit-api.xml

  e2e-playwright:
    name: Playwright Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-frontend-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist-tarball

      - name: Extract frontend dist artifact
        run: tar -xzf frontend-dist.tgz -C .

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run Playwright server suite
        env:
          E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts/server-browser
        run: python -m unittest -q tests.e2e.test_playwright_server

      - name: Upload Playwright server artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-server
          path: ${{ github.workspace }}/e2e-artifacts/server-browser
          if-no-files-found: ignore

  e2e-playwright-standalone:
    name: Playwright Standalone Browser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-frontend-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Download standalone output artifact
        uses: actions/download-artifact@v5
        with:
          name: standalone-output-tarball

      - name: Extract standalone output artifact
        run: tar -xzf standalone-output.tgz -C .

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run standalone Playwright suite
        env:
          E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts/standalone-browser
        run: python -m unittest -q tests.e2e.test_playwright_standalone_runtime

      - name: Upload standalone Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-standalone-browser
          path: ${{ github.workspace }}/e2e-artifacts/standalone-browser
          if-no-files-found: ignore

  pages-build:
    name: Build GitHub Pages Demo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      - build-frontend-artifacts
      - frontend-backend
      - backend-coverage-report
      - e2e-playwright
      - e2e-playwright-standalone

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download standalone output artifact
        uses: actions/download-artifact@v5
        with:
          name: standalone-output-tarball

      - name: Extract standalone output artifact
        run: tar -xzf standalone-output.tgz -C .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/standalone

  pages-deploy:
    name: Deploy GitHub Pages Demo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: pages-build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

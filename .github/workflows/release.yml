name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Validate, Build, And Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release prerequisites
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="docs/releases/${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "missing release notes file ${NOTES}"
            exit 1
          fi
          for doc in README.md CHANGELOG.md docs/MAINTENANCE.md; do
            if ! grep -q "$TAG" "$doc"; then
              echo "version ${TAG} is missing from ${doc}"
              exit 1
            fi
          done
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "tag ${TAG} does not point at a commit contained in main"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build frontend artifacts
        run: |
          npm run build:frontend
          npm run build:frontend:standalone

      - name: Check standalone bundle size budget
        run: python -m tools build bundle-size

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Smoke test the standalone bundle
        run: |
          mkdir -p output/standalone-smoke
          python -m tools browser smoke-standalone \
            --output output/standalone-smoke/summary.txt

      - name: Package standalone bundle
        run: |
          TAG="${GITHUB_REF_NAME}"
          (cd output/standalone && zip -r "../../cellular-automaton-lab-standalone-${TAG}.zip" .)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="cellular-automaton-lab-standalone-${TAG}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; uploading the standalone bundle"
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --notes-file "docs/releases/${TAG}.md" \
              --latest \
              "$ASSET"
          fi

version: 2
updates:
    - package-ecosystem: pip
      directory: "/"
      schedule:
          interval: weekly
          day: monday
          time: "06:00"
          timezone: Etc/UTC
      groups:
          python-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: npm
      directory: "/"
      schedule:
          interval: weekly
          day: monday
          time: "06:00"
          timezone: Etc/UTC
      groups:
          npm-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
          day: monday
          time: "06:00"
          timezone: Etc/UTC
      groups:
          actions-all:
              patterns:
                  - "*"

# Consolidated Python tooling configuration. The repo is not packaged for
# PyPI; this file only carries tool config previously split across
# ruff.toml, mypy.ini, pytest.ini, and .coveragerc.

[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
    "node_modules",
    "output",
    "static/dist",
]

[tool.ruff.lint]
select = ["F", "E7", "E9", "I", "B", "UP"]

[tool.pytest.ini_options]
cache_dir = "output/.pytest_cache"

[tool.coverage.run]
branch = true
source = [
    "backend",
    "tools",
]

[tool.coverage.report]
omit = [
    "*/__pycache__/*",
    "tools/bench_canvas.py",
    "tools/bench_engine.py",
]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.13"
files = ["app.py", "backend", "tests", "tools"]
explicit_package_bases = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = [
    "backend.*",
    "tools.*",
    "app",
    "tests.api.*",
    "tests.unit.*",
    "tests.e2e.*",
]
check_untyped_defs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "tests.e2e.support_server",
    "tests.e2e.support_browser",
    "tests.e2e.browser_support.*",
]
check_untyped_defs = true
disallow_any_generics = true
disallow_subclassing_any = true

[[tool.mypy.overrides]]
module = [
    "networkx.*",
    "shapely.*",
    "playwright.*",
    "fitz",
    "fitz.*",
]
ignore_missing_imports = true

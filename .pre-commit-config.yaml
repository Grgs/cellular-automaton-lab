minimum_pre_commit_version: "4.5.1"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: privacy-guard-staged
        name: privacy guard (changed files)
        entry: python -m tools security privacy
        language: python
        stages: [pre-commit]
      - id: privacy-guard-push
        name: privacy guard (full repo)
        entry: python -m tools security privacy --all-files
        language: python
        pass_filenames: false
        stages: [pre-push, manual]
      - id: detect-secrets-staged
        name: detect-secrets (changed files)
        entry: py -3 -m tools security secrets --baseline .secrets.baseline
        language: system
        stages: [pre-commit]
      - id: detect-secrets-push
        name: detect-secrets (full repo)
        entry: py -3 -m tools security secrets --baseline .secrets.baseline --all-files
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
      - id: ruff-python
        name: ruff (python)
        entry: python -m tools repo python-style check
        language: python
        additional_dependencies:
          - ruff==0.15.11
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: ruff-format-python
        name: ruff format (python)
        entry: python -m tools repo python-style format-check
        language: python
        additional_dependencies:
          - ruff==0.15.11
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: frontend-lint
        name: frontend lint
        entry: npm run lint:frontend
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: doc-links
        name: documentation links
        entry: npm run check:doc-links
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
